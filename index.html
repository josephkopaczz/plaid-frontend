<!DOCTYPE html>
<html>
<head>
  <title>KBDBS Income Verification</title>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body style="font-family: Arial; text-align:center; margin-top:100px;">

  <h2>Upload Income Documents</h2>
  <button id="connect-income" style="padding:15px 30px; font-size:18px;">
    Start Income Verification
  </button>

  <pre id="output" style="text-align:left; width:80%; margin:40px auto;"></pre>

  <script>
    document.getElementById('connect-income').onclick = async function() {

      try {

        const response = await fetch('https://plaid-backend-u0eg.onrender.com/create_income_link_token', {
          method: 'POST'
        });

        const data = await response.json();
        console.log("Backend response:", data);

        if (!data.link_token) {
          document.getElementById('output').innerText =
            "No link_token returned:\n" + JSON.stringify(data, null, 2);
          return;
        }

        const handler = Plaid.create({
          token: data.link_token,
          onSuccess: function(public_token, metadata) {
            document.getElementById('output').innerText =
              "Success:\n" + JSON.stringify(metadata, null, 2);
          },
          onExit: function(err, metadata) {
            if (err) {
              document.getElementById('output').innerText =
                "Error:\n" + JSON.stringify(err, null, 2);
            }
          }
        });

        handler.open();

      } catch (err) {
        document.getElementById('output').innerText =
          "Frontend error:\n" + err;
      }

    };
  </script>

</body>
</html>
